<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>工作树看板</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>工作树看板</h1>
        <p id="project-line">正在加载项目...</p>
      </div>
      <div class="status-pill" id="refresh-state">启动中</div>
    </header>

    <main>
      <section class="metrics" aria-label="项目概览">
        <div><span id="count-active">0</span><small>进行中</small></div>
        <div><span id="count-dirty">0</span><small>有未提交</small></div>
        <div><span id="count-ready">0</span><small>待合并</small></div>
        <div><span id="count-blocked">0</span><small>阻塞</small></div>
      </section>

      <section class="table-wrap" aria-label="工作树状态表">
        <table>
          <thead>
            <tr>
              <th>任务</th>
              <th>状态</th>
              <th>分支</th>
              <th>工作区</th>
              <th>领先</th>
              <th>落后</th>
              <th>测试状态</th>
              <th>最新提交</th>
              <th>提交记录</th>
              <th>合并状态</th>
              <th>清理</th>
              <th>更新时间</th>
              <th>路径</th>
            </tr>
          </thead>
          <tbody id="task-body">
            <tr><td colspan="13">正在加载...</td></tr>
          </tbody>
        </table>
      </section>

      <section class="commits" aria-label="提交记录">
        <div class="section-head">
          <h2>提交记录</h2>
          <p id="commit-task-line">未选择任务</p>
        </div>
        <div id="commit-panel" class="commit-panel">未选择任务</div>
      </section>

      <section class="timeline" aria-label="合并历史时间轴">
        <div class="section-head">
          <h2>合并历史时间轴</h2>
          <p id="timeline-state">正在加载...</p>
        </div>
        <div id="timeline-warning" class="timeline-warning"></div>
        <div id="timeline-panel" class="timeline-panel">正在加载...</div>
      </section>

      <section class="events" aria-label="最近事件">
        <h2>最近事件</h2>
        <ul id="event-list"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
